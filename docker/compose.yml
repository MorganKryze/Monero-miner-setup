services:
  xmrig:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: monero_xmrig_miner
    restart: unless-stopped
    
    environment:
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - WORKER_NAME=${WORKER_NAME:-miner_docker}
      - POOL_URL=${POOL_URL:-gulf.moneroocean.stream}
      - DONATE_LEVEL=${DONATE_LEVEL:-0}
      - MAX_THREADS_PERCENT=${MAX_THREADS_PERCENT:-25}
      - PAUSE_ON_BATTERY=${PAUSE_ON_BATTERY:-false}
      - PAUSE_ON_ACTIVE=${PAUSE_ON_ACTIVE:-false}
      - FORCE_THREAD_COUNT=${FORCE_THREAD_COUNT:-2}
    
    # Resource caps. Top-level keys rather than deploy.resources.limits so
    # they apply under plain `docker compose up` without requiring Swarm mode.
    cpus: '${CPU_COUNT:-2.0}'
    mem_limit: '${MEMORY_LIMIT:-1g}'


    # Mount logs for persistence
    volumes:
      - ./logs:/app/logs
      - ./docker-configs:/app/configs
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Resource limits
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    
    # Health check override
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Container stdout/stderr rotation (the /app/logs/xmrig.log file inside
    # the container is separate; mount it read-only or truncate it externally
    # if disk growth is a concern).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"